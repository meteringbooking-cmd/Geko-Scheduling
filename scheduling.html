<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geko — Scheduling</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent-green: #00ff9d;
    --accent-blue:  #00c8ff;
    --text-main:    #e6f7ff;
    --text-muted:   #8fa0b8;
    --danger:       #ff4b5c;
    --transition-fast: 0.18s ease-out;
    --transition-med:  0.28s ease-out;
    --sidebar-w-collapsed: 64px;
    --sidebar-w-expanded:  210px;
    --row-h:    72px;
    --time-h:   44px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top left, #101525 0, #05070b 45%, #020308 100%);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35; pointer-events: none;
    animation: gridMove 40s linear infinite; z-index: 0;
  }
  @keyframes gridMove { from{transform:translate3d(0,0,0)} to{transform:translate3d(-40px,-40px,0)} }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w-collapsed); min-height: 100vh;
    background: rgba(5,10,18,0.95); border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: width var(--transition-med);
    overflow: hidden; position: relative; z-index: 100;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
  }
  #sidebar.expanded { width: var(--sidebar-w-expanded); }

  .sidebar-header {
    height: 70px; display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0; padding: 0; overflow: hidden;
  }
  .sidebar-logo-collapsed {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    filter: drop-shadow(0 0 10px rgba(0,255,157,0.5));
    display: block; cursor: pointer;
    transition: filter var(--transition-fast), transform var(--transition-fast);
  }
  .sidebar-logo-collapsed:hover { filter: drop-shadow(0 0 16px rgba(0,255,157,0.8)); transform: scale(1.03); }
  .sidebar-logo-expanded {
    height: 40px; object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(0,255,157,0.5));
    border-radius: 8px; opacity: 0; max-width: 0; overflow: hidden;
    transition: opacity var(--transition-med), max-width var(--transition-med);
    display: block; margin-left: 14px; flex-shrink: 0;
  }
  #sidebar.expanded .sidebar-logo-collapsed { display: none; }
  #sidebar.expanded .sidebar-header { padding: 0 12px; justify-content: space-between; }
  #sidebar.expanded .sidebar-logo-expanded { opacity: 1; max-width: 150px; }

  .sidebar-toggle {
    width: 30px; height: 30px; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
    color: var(--text-muted); cursor: pointer; display: none;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: all var(--transition-fast);
  }
  #sidebar.expanded .sidebar-toggle { display: flex; }
  .sidebar-toggle:hover { background: rgba(255,255,255,0.08); color: var(--text-main); }

  .sidebar-nav { flex: 1; padding: 14px 0; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-link {
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px; height: 46px; text-decoration: none; color: var(--text-muted);
    transition: all var(--transition-fast); white-space: nowrap;
    border-left: 2px solid transparent; flex-shrink: 0; position: relative;
  }
  .sidebar-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
  .sidebar-link.active { background: rgba(0,255,157,0.08); color: var(--accent-green); border-left-color: var(--accent-green); }
  .sidebar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 8px; }
  .sidebar-link.active .sidebar-icon { background: rgba(0,255,157,0.10); }
  .sidebar-label { font-size: 13px; font-weight: 500; opacity: 0; max-width: 0; overflow: hidden; transition: opacity var(--transition-med), max-width var(--transition-med); pointer-events: none; }
  #sidebar.expanded .sidebar-label { opacity: 1; max-width: 140px; }
  .sidebar-link::after {
    content: attr(data-label); position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
    background: rgba(5,10,18,0.97); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-main); font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: 8px; white-space: nowrap; opacity: 0;
    pointer-events: none; transition: opacity 0.15s; z-index: 200;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.5);
  }
  #sidebar:not(.expanded) .sidebar-link:hover::after { opacity: 1; }
  .sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .sidebar-version { font-size: 10px; color: rgba(143,160,184,0.35); text-align: center; letter-spacing: 0.5px; opacity: 0; transition: opacity var(--transition-med); }
  #sidebar.expanded .sidebar-version { opacity: 1; }

  /* ── MAIN ── */
  #main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; position: relative; z-index: 1; height: 100vh; }

  #topbar {
    width: 100%; padding: 14px 26px; background: rgba(5,10,18,0.9);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-between; align-items: center;
    z-index: 5; box-shadow: 0 10px 30px rgba(0,0,0,0.7); flex-shrink: 0;
  }
  #topbar-title { font-size: 16px; text-transform: uppercase; letter-spacing: 0.12em; }
  #topbar-subtitle { font-size: 12px; color: var(--text-muted); }
  #topbar-right { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted); }
  #status-dot { width: 10px; height: 10px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px rgba(0,255,157,0.8); display: inline-block; }

  #toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    background: rgba(5,10,18,0.9); border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0; flex-wrap: wrap; z-index: 4;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(5,8,16,0.9);
    color: var(--text-muted); transition: all var(--transition-fast);
    font-family: 'Inter', sans-serif; white-space: nowrap; letter-spacing: 0.04em;
  }
  .btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-main); }
  .btn.active { background: rgba(0,255,157,0.08); border-color: rgba(0,255,157,0.4); color: var(--accent-green); }
  .btn-accent { background: linear-gradient(90deg, var(--accent-green), var(--accent-blue)); color: #020308; border: none; font-weight: 600; }
  .btn-accent:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .tsep { width: 1px; height: 24px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
  .date-nav { display: flex; align-items: center; gap: 5px; }
  .dnb {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(5,8,16,0.9); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: all var(--transition-fast);
  }
  .dnb:hover { color: var(--text-main); border-color: rgba(255,255,255,0.2); }
  .date-lbl { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; min-width: 220px; text-align: center; }
  #datePicker {
    background: rgba(5,8,16,0.9); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: var(--text-main); padding: 6px 10px;
    font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; outline: none;
  }
  #datePicker::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
  .search-wrapper { position: relative; display: flex; align-items: center; }
  .search-wrapper svg { position: absolute; left: 10px; pointer-events: none; opacity: 0.4; }
  .search-input {
    height: 34px; background: rgba(5,8,16,0.9); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; color: var(--text-main); font-size: 12px; font-family: 'Inter', sans-serif;
    padding: 0 12px 0 32px; outline: none; width: 155px;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast), width var(--transition-fast);
  }
  .search-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 12px rgba(0,200,255,0.2); width: 190px; }
  .search-input::placeholder { color: var(--text-muted); }
  #jobCountLbl { font-size: 12px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

  .lbar { height: 2px; flex-shrink: 0; }
  .lbar.on { background: rgba(255,255,255,0.04); position: relative; overflow: hidden; }
  .lbar.on::after { content:""; position:absolute; top:0; left:-60%; width:60%; height:100%; background:linear-gradient(90deg,transparent,var(--accent-green),transparent); animation:loadsh 1.2s infinite; }
  @keyframes loadsh { to { left: 160%; } }

  .status-bar {
    display: flex; align-items: center; gap: 8px; padding: 5px 20px;
    background: rgba(5,10,18,0.9); border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 12px; color: var(--text-muted); flex-shrink: 0;
  }
  .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: orange; }
  .sdot.ok  { background: var(--accent-green); box-shadow: 0 0 6px rgba(0,255,157,0.5); }
  .sdot.err { background: var(--danger); }
  .sdot.spin { animation: blink 1s infinite; background: var(--accent-blue); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── SCHEDULE LAYOUT ── */
  .sched-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .grid-area  { display: flex; flex: 1; overflow: hidden; }

  .eng-col {
    width: 160px; min-width: 160px; flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
    background: rgba(5,10,18,0.9); display: flex; flex-direction: column;
  }
  .eng-col-hdr {
    height: var(--time-h); flex-shrink: 0; display: flex; align-items: center; padding: 0 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
    background: rgba(10,14,24,0.9);
  }
  .eng-list { overflow-y: auto; flex: 1; }
  .eng-list::-webkit-scrollbar { display: none; }

  .eng-row {
    height: var(--row-h); display: flex; align-items: center; gap: 10px;
    padding: 0 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .eng-row.auto { height: auto; min-height: var(--row-h); padding: 8px 14px; align-items: flex-start; }

  .eng-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #020308;
  }
  .eng-name { font-size: 12px; font-weight: 500; line-height: 1.3; color: var(--text-main); }

  /* ── FIX: scroll-area must NOT clip overflow so week popups can escape ── */
  .scroll-area {
    flex: 1;
    overflow-x: auto;
    overflow-y: auto;
    position: relative;
  }
  .scroll-area::-webkit-scrollbar { width: 5px; height: 5px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  /* ── TIME HEADER ── */
  .time-header {
    display: flex; height: var(--time-h); position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,24,0.97); border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .t-hdr-cell { flex-shrink: 0; display: flex; align-items: stretch; border-right: 1px solid rgba(255,255,255,0.04); }
  .t-hdr-half { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .t-hdr-half:first-child { border-right: 1px solid rgba(255,255,255,0.04); color: var(--text-main); font-weight: 600; }
  .t-hdr-cell.week-cell { flex: 1; justify-content: center; align-items: center; flex-direction: column; display: flex; font-size: 11px; }
  .t-hdr-cell.today-col { color: var(--accent-green); background: rgba(0,255,157,0.04); }
  .t-hdr-cell.weekend   { opacity: 0.45; }

  /* ── ROWS WRAP ── */
  .rows-wrap { position: relative; min-height: 100%; }

  .hour-grid { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; display: flex; }
  .hg-col { flex-shrink: 0; height: 100%; border-right: 1px solid rgba(255,255,255,0.03); position: relative; }
  .hg-col::after { content:""; position:absolute; top:0; bottom:0; left:50%; width:1px; background:rgba(255,255,255,0.015); }

  /* ── ENGINEER ROW ── */
  .eng-tl-row {
    display: flex; border-bottom: 1px solid rgba(255,255,255,0.04); position: relative;
  }
  .eng-tl-row.day-mode  { height: var(--row-h); }
  /* Week mode: height is driven by the tallest cell content.
     overflow:visible is essential so stacked pop-ups escape the row. */
  .eng-tl-row.week-mode {
    height: auto;
    min-height: var(--row-h);
    align-items: stretch;
    overflow: visible;   /* FIX: allow stacked popups to overflow row bounds */
  }

  /* ── DAY VIEW: DROP SLOTS ── */
  .day-drop-overlay {
    position: absolute; top: 0; bottom: 0; left: 0;
    display: flex; z-index: 1; pointer-events: none;
  }
  .day-hour-drop {
    flex-shrink: 0; height: 100%; pointer-events: all;
    border-right: 1px dashed transparent;
    transition: background var(--transition-fast); position: relative;
  }
  .day-hour-drop.drag-over { background: rgba(0,255,157,0.10) !important; border-color: rgba(0,255,157,0.35); }
  .slot-label {
    position: absolute; bottom: 3px; left: 3px; font-size: 9px;
    color: rgba(143,160,184,0.25); pointer-events: none; letter-spacing: 0.3px;
  }

  /* ── DAY CARDS ── */
  .job-card-day {
    position: absolute; top: 7px; bottom: 7px;
    background: rgba(10,18,30,0.96); border: 1px solid rgba(255,255,255,0.08);
    border-top-width: 3px; border-radius: 8px;
    padding: 5px 8px; cursor: grab; user-select: none;
    /* FIX: z-index 2 so cards sit above drop overlay (z-index 1) but
       .dragging drops to z-index 0 + pointer-events:none so slots fire */
    z-index: 2; overflow: hidden;
    transition: box-shadow 0.2s, opacity 0.15s;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .job-card-day:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.8); overflow: visible; z-index: 100; border-color: rgba(0,255,157,0.3); }
  .job-card-day:hover .jc-tooltip { opacity: 1; transform: translateY(0); }
  /* KEY FIX: dragging card must be pointer-events:none so drag events
     reach the drop slots underneath. Also lower z-index below overlay. */
  .job-card-day.dragging {
    opacity: 0.3;
    cursor: grabbing;
    pointer-events: none !important;
    z-index: 0 !important;
  }

  .job-card-day.staging-card {
    position: relative; top: auto; bottom: auto; left: auto !important;
    width: auto !important; margin-bottom: 3px;
    border-color: rgba(255,200,0,0.35); border-top-color: #ffc800;
    background: rgba(15,12,0,0.95);
    animation: pendingPulse 2.5s ease-in-out infinite;
  }
  @keyframes pendingPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,200,0,0)} 50%{box-shadow:0 0 10px 2px rgba(255,200,0,0.15)} }

  /* ── TOOLTIP ── */
  .jc-tooltip {
    position: absolute; top: calc(100% + 6px); left: 0; min-width: 210px; max-width: 260px;
    background: rgba(5,10,18,0.99); border: 1px solid rgba(0,255,157,0.22); border-radius: 10px;
    padding: 11px 14px; z-index: 400; box-shadow: 0 10px 40px rgba(0,0,0,0.85);
    opacity: 0; pointer-events: none; transform: translateY(6px);
    transition: opacity 0.18s, transform 0.18s;
  }
  .jc-tooltip-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; }
  .jc-tooltip-row:last-child { margin-bottom: 0; }
  .jc-tooltip-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; flex-shrink: 0; width: 62px; }
  .jc-tooltip-val { font-size: 12px; color: var(--text-main); font-weight: 500; }

  .jc-customer { font-size: 10px; font-weight: 500; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .jc-type     { font-size: 12px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .jc-bottom   { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
  .jc-post     { font-size: 10px; color: var(--text-muted); }
  .jc-id       { font-size: 10px; color: var(--accent-green); font-weight: 700; }
  .jc-time     { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ── STAGING ZONE ── */
  .staging-zone {
    position: absolute; top: 0; bottom: 0; right: 0; width: 140px;
    border-left: 2px dashed rgba(255,200,0,0.2); background: rgba(15,12,0,0.5);
    display: flex; flex-direction: column; gap: 3px; padding: 5px;
    overflow-y: auto; z-index: 3;
  }
  .staging-zone.drag-over-s { background: rgba(255,200,0,0.08) !important; }
  .staging-hint { display: flex; align-items: center; justify-content: center; flex: 1; pointer-events: none; }
  .staging-hint span { font-size: 9px; color: rgba(255,200,0,0.25); text-transform: uppercase; letter-spacing: 0.4px; text-align: center; }

  /* ── WEEK VIEW CELLS ── */
  .week-cell-drop {
    flex: 1;
    border-right: 1px solid rgba(255,255,255,0.03);
    padding: 4px;
    transition: background var(--transition-fast);
    /* FIX: position relative + overflow visible so popup escapes row */
    position: relative;
    overflow: visible;
    min-height: var(--row-h);
  }
  .week-cell-drop.today-col { background: rgba(0,255,157,0.02); }
  .week-cell-drop.weekend   { background: rgba(255,255,255,0.005); }
  .week-cell-drop.drag-over { background: rgba(0,255,157,0.08) !important; outline: 2px dashed rgba(0,255,157,0.4); outline-offset: -2px; }

  /* ── WEEK CARDS ── */
  .job-card-week {
    background: rgba(10,18,30,0.96); border: 1px solid rgba(255,255,255,0.08); border-left-width: 3px;
    border-radius: 7px; padding: 5px 7px; cursor: grab; user-select: none;
    margin-bottom: 3px; transition: box-shadow 0.2s; overflow: hidden; font-size: 11px;
    width: 100%; display: block;
  }
  .job-card-week:last-child { margin-bottom: 0; }
  .job-card-week:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.6); border-color: rgba(0,200,255,0.3); }
  .job-card-week.dragging { opacity: 0.35; pointer-events: none; }

  /* ── WEEK STACKED POPUP ──
     The popup is a fixed-position floating panel anchored via JS.
     This avoids ALL overflow-clip issues from parent rows/scroll containers. */
  .week-stack-popup {
    position: fixed;           /* escape ALL containing blocks */
    z-index: 9000;
    background: rgba(8,12,22,0.99);
    border: 1px solid rgba(0,200,255,0.25);
    border-radius: 10px;
    padding: 8px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.9), 0 0 0 1px rgba(0,200,255,0.1);
    min-width: 160px;
    max-width: 220px;
    /* Hidden by default */
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .week-stack-popup.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }
  .week-stack-popup .job-card-week {
    width: 100%;
    margin-bottom: 4px;
  }
  .week-stack-popup .job-card-week:last-child { margin-bottom: 0; }

  /* The visible "first card + badge" in collapsed state */
  .week-cell-drop.stacked .job-card-week { display: none; }
  .week-cell-drop.stacked .job-card-week:first-of-type { display: block; }

  .stack-badge {
    display: inline-flex; align-items: center; justify-content: center;
    position: absolute; bottom: 4px; right: 4px;
    background: var(--accent-blue); color: #020308;
    font-size: 9px; font-weight: 700; border-radius: 10px; padding: 2px 6px;
    pointer-events: none; z-index: 5; cursor: default;
  }

  /* Search */
  .job-card-day.search-match, .job-card-week.search-match { box-shadow: 0 0 0 2px var(--accent-blue) !important; }
  .job-card-day.search-dim,   .job-card-week.search-dim   { opacity: 0.15 !important; }

  /* Now line */
  .now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--danger); z-index: 30; pointer-events: none; }
  .now-line::before { content:""; position:absolute; top:50%; left:-4px; width:10px; height:10px; border-radius:50%; background:var(--danger); transform:translateY(-50%); }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: rgba(10,14,24,0.98); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; width: 500px; max-width: 94vw; max-height: 88vh; overflow-y: auto; transform: translateY(16px); transition: transform 0.22s; box-shadow: 0 24px 60px rgba(0,0,0,0.9); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-head { padding: 22px 26px 16px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .modal-title { font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
  .modal-id    { font-size: 12px; color: var(--accent-green); font-weight: 700; margin-top: 3px; }
  .modal-close { width: 30px; height: 30px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }
  .modal-body { padding: 18px 26px 26px; }
  .dg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .df label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); display: block; margin-bottom: 3px; }
  .df span  { font-size: 13px; color: var(--text-main); }
  .df.full  { grid-column: 1/-1; }
  .ddiv     { height: 1px; background: rgba(255,255,255,0.06); grid-column: 1/-1; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; transform: translateY(20px); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; pointer-events: none; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: rgba(10,20,15,0.97); border: 1px solid rgba(0,255,157,0.4); color: var(--accent-green); box-shadow: 0 0 30px rgba(0,255,157,0.15),0 16px 40px rgba(0,0,0,0.8); }
  #toast.error   { background: rgba(20,10,12,0.97); border: 1px solid rgba(255,75,92,0.4);  color: var(--danger);       box-shadow: 0 0 30px rgba(255,75,92,0.15), 0 16px 40px rgba(0,0,0,0.8); }

  #loading-overlay { position: fixed; inset: 0; background: rgba(2,3,8,0.75); display: flex; align-items: center; justify-content: center; z-index: 9998; backdrop-filter: blur(6px); }
  #loading-overlay.hidden { display: none; }
  .loading-box { padding: 30px 40px; border-radius: 18px; background: rgba(10,14,24,0.98); border: 1px solid rgba(255,255,255,0.06); text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.9); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.06); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  .loading-text { font-size: 13px; color: var(--text-muted); }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteField }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyDVy6E89BBETXvRk6H__HfjSE6k4IfqrqU",
  authDomain:"geko-scheduling.firebaseapp.com",
  projectId:"geko-scheduling",
  storageBucket:"geko-scheduling.firebasestorage.app",
  messagingSenderId:"824568732787",
  appId:"1:824568732787:web:c12db983fd6a5b44b01e06"
}));

/* ─── Constants ──────────────────────────────────────────────── */
const HOUR_W    = 160;
const ROW_H     = 72;
const DAY_START = 7;
const DAY_END_MIN = 18;
const STAGING_W = 140;

const JOB_DURATIONS = { "dual fuel":2, "single gas":1.5, "single elec":1.5, "comms":0.5 };

function getDuration(t){ const k=(t||"").toLowerCase(); for(const[key,v]of Object.entries(JOB_DURATIONS))if(k.includes(key))return v; return 1; }

function getStartHour(job){
  const v = job.startHour;
  if(v===null||v===undefined||v==="") return null;
  const n=+v; return isNaN(n)?null:n;
}

function calcDayEnd(jobs){
  let end=DAY_END_MIN;
  jobs.forEach(j=>{
    const sh=getStartHour(j); if(sh===null)return;
    const fin=sh+getDuration(j.jobType); if(fin>end)end=Math.ceil(fin)+0.5;
  });
  return end;
}

const COLOURS=["#00c896","#0084ff","#f59e0b","#ff4d6a","#a855f7","#06b6d4","#f97316","#10b981"];
function cardColour(t){ const h=[...(t||"x")].reduce((a,c)=>a+c.charCodeAt(0),0); return COLOURS[h%COLOURS.length]; }

/* ─── State ──────────────────────────────────────────────────── */
let allJobs=[], currentView="day", currentDate=today0(), dragJob=null;
let jobSearch="", engSearch="";
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }

/* ─── Date helpers ───────────────────────────────────────────── */
function parseDate(s){
  if(!s)return null; s=String(s).trim(); let m;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);d.setHours(0,0,0,0);return isNaN(d)?null:d;}
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);        if(m){const d=new Date(+m[1],+m[2]-1,+m[3]);d.setHours(0,0,0,0);return isNaN(d)?null:d;}
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(m){let y=+m[3];if(y<100)y+=2000;const d=new Date(y,+m[1]-1,+m[2]);d.setHours(0,0,0,0);return isNaN(d)?null:d;}
  const d=new Date(s);if(!isNaN(d)){d.setHours(0,0,0,0);return d;}return null;
}
function sameDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function toUKStr(d){return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}
function fmtTime(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return`${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;}
function getCols(){
  if(currentView==="day")return[new Date(currentDate)];
  const dow=currentDate.getDay(),diff=dow===0?-6:1-dow;
  const mon=new Date(currentDate);mon.setDate(currentDate.getDate()+diff);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

/* ─── Event wiring ───────────────────────────────────────────── */
document.getElementById("prevBtn").onclick   =()=>navigate(-1);
document.getElementById("nextBtn").onclick   =()=>navigate(1);
document.getElementById("todayBtn").onclick  =()=>{currentDate=today0();syncPicker();render();};
document.getElementById("refreshBtn").onclick=()=>loadJobs();
document.getElementById("btnDay").onclick    =()=>setView("day");
document.getElementById("btnWeek").onclick   =()=>setView("week");
document.getElementById("datePicker").onchange=e=>{
  const[y,mo,d]=e.target.value.split("-").map(Number);
  currentDate=new Date(y,mo-1,d);currentDate.setHours(0,0,0,0);render();
};
document.getElementById("modalClose").onclick   =closeModal;
document.getElementById("modalOverlay").onclick =e=>{if(e.target===document.getElementById("modalOverlay"))closeModal();};
document.getElementById("jobSearch").oninput=e=>{jobSearch=e.target.value.trim().toLowerCase();applySearch();};
document.getElementById("engSearch").oninput=e=>{engSearch=e.target.value.trim().toLowerCase();applySearch();};

function navigate(dir){currentDate.setDate(currentDate.getDate()+dir*(currentView==="week"?7:1));syncPicker();render();}
function setView(v){currentView=v;document.getElementById("btnDay").classList.toggle("active",v==="day");document.getElementById("btnWeek").classList.toggle("active",v==="week");render();}
function syncPicker(){const y=currentDate.getFullYear(),mo=String(currentDate.getMonth()+1).padStart(2,"0"),d=String(currentDate.getDate()).padStart(2,"0");document.getElementById("datePicker").value=`${y}-${mo}-${d}`;}
function setStatus(st,msg){const dot=document.getElementById("sdot"),txt=document.getElementById("stxt");dot.className="sdot"+(st==="spin"?" spin":st==="ok"?" ok":" err");txt.textContent=msg;}
function setLoading(on){document.getElementById("lbar").classList.toggle("on",on);}
let toastTimer;
function toast(msg,type="success"){
  const t=document.getElementById("toast");
  const ico=type==="success"?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  t.className=`${type} show`;t.innerHTML=ico+" "+msg;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),3200);
}
function esc(s){return String(s||"—").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ─── Firebase load ──────────────────────────────────────────── */
async function loadJobs(){
  setLoading(true);setStatus("spin","Loading…");
  try{
    const snap=await getDocs(collection(db,"uploaded_jobs"));
    allJobs=[];snap.forEach(d=>allJobs.push({_id:d.id,...d.data()}));
    setStatus("ok",`${allJobs.length} jobs loaded`);
    toast(`${allJobs.length} job${allJobs.length!==1?"s":""} loaded`);
    render();
  }catch(e){
    console.error(e);setStatus("err","Error: "+(e.code||e.message));toast("Failed to load","error");
  }
  setLoading(false);document.getElementById("loading-overlay").classList.add("hidden");
}

/* ─── Render ─────────────────────────────────────────────────── */
function render(){
  hideStackPopup();
  syncPicker();
  const cols=getCols();
  const colJobs=allJobs.filter(j=>{const jd=parseDate(j.dateOfJob);return jd&&cols.some(c=>sameDay(c,jd));});
  const dayEnd=currentView==="day"?calcDayEnd(colJobs):DAY_END_MIN;
  renderHeader(cols,dayEnd);
  renderRows(cols,dayEnd);
  updateLabel(cols);
  if(currentView==="day")updateNowLine(dayEnd);
  applySearch();
}

function updateLabel(cols){
  document.getElementById("dateLbl").textContent=currentView==="day"
    ?cols[0].toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
    :`${cols[0].toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${cols[6].toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}`;
}

function renderHeader(cols,dayEnd){
  const hdr=document.getElementById("timeHeader");
  hdr.innerHTML="";hdr.removeAttribute("style");
  const hours=dayEnd-DAY_START,todayD=today0();
  if(currentView==="day"){
    hdr.style.width=`${HOUR_W*hours+STAGING_W}px`;hdr.style.flexShrink="0";
    for(let h=DAY_START;h<dayEnd;h++){
      const c=document.createElement("div");c.className="t-hdr-cell";c.style.width=HOUR_W+"px";
      const h1=document.createElement("div");h1.className="t-hdr-half";h1.textContent=`${String(h).padStart(2,"0")}:00`;
      const h2=document.createElement("div");h2.className="t-hdr-half";h2.textContent=`${String(h).padStart(2,"0")}:30`;
      c.appendChild(h1);c.appendChild(h2);hdr.appendChild(c);
    }
    const stg=document.createElement("div");
    stg.style.cssText=`flex-shrink:0;width:${STAGING_W}px;display:flex;align-items:center;justify-content:center;border-left:2px dashed rgba(255,200,0,0.2);`;
    stg.innerHTML=`<span style="font-size:9px;color:rgba(255,200,0,0.35);text-transform:uppercase;letter-spacing:.5px;">Unscheduled</span>`;
    hdr.appendChild(stg);
  }else{
    cols.forEach(col=>{
      const c=document.createElement("div");c.className="t-hdr-cell week-cell";
      const dow=col.getDay();
      if(dow===0||dow===6)c.classList.add("weekend");
      if(sameDay(col,todayD))c.classList.add("today-col");
      c.innerHTML=`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">${col.toLocaleDateString("en-GB",{weekday:"short"})}</div><div style="font-size:15px;font-weight:700">${col.getDate()}</div>`;
      hdr.appendChild(c);
    });
  }
}

function renderRows(cols,dayEnd){
  const hours=dayEnd-DAY_START,todayD=today0();
  const engSet=new Set(allJobs.map(j=>j.engineerName).filter(Boolean));
  const engineers=[...engSet].sort((a,b)=>a.localeCompare(b));
  const visibleJobs=allJobs.filter(j=>{const jd=parseDate(j.dateOfJob);return jd&&cols.some(c=>sameDay(c,jd));});
  document.getElementById("jobCountLbl").textContent=`${visibleJobs.length} job${visibleJobs.length!==1?"s":""} in view`;

  const engList=document.getElementById("engList");engList.innerHTML="";
  const rowsWrap=document.getElementById("rowsWrap");
  const rowsCont=document.getElementById("rowsContainer");rowsCont.innerHTML="";
  const hourGrid=document.getElementById("hourGrid");hourGrid.innerHTML="";

  if(!engineers.length){
    engList.innerHTML=`<div style="padding:20px 14px;color:var(--text-muted);font-size:13px;text-align:center;line-height:1.7">No engineers found.<br/>Upload jobs first.</div>`;
    return;
  }

  if(currentView==="day"){
    const tw=HOUR_W*hours+STAGING_W;
    rowsWrap.style.width=tw+"px";rowsWrap.style.minWidth=tw+"px";
    for(let i=0;i<hours;i++){const c=document.createElement("div");c.className="hg-col";c.style.width=HOUR_W+"px";hourGrid.appendChild(c);}
  }else{
    rowsWrap.style.width="";rowsWrap.style.minWidth="";
  }

  document.getElementById("scrollArea").onscroll=()=>{
    engList.scrollTop=document.getElementById("scrollArea").scrollTop;
    hideStackPopup(); // hide popup on scroll to avoid stale position
  };

  engineers.forEach(eng=>{
    /* sidebar row */
    const sr=document.createElement("div");
    sr.className="eng-row"+(currentView==="week"?" auto":"");
    sr.dataset.eng=eng;
    const init=eng.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2);
    sr.innerHTML=`<div class="eng-avatar">${esc(init)}</div><div class="eng-name">${esc(eng)}</div>`;
    engList.appendChild(sr);

    const engJobs=visibleJobs.filter(j=>j.engineerName===eng);
    const row=document.createElement("div");
    row.className="eng-tl-row "+(currentView==="day"?"day-mode":"week-mode");
    row.dataset.eng=eng;

    /* ── DAY VIEW ── */
    if(currentView==="day"){
      row.style.height=ROW_H+"px";
      row.style.width=`${HOUR_W*hours+STAGING_W}px`;
      const col=cols[0];
      const dayJobs=engJobs.filter(j=>sameDay(parseDate(j.dateOfJob),col));

      const scheduled=dayJobs.filter(j=>getStartHour(j)!==null);
      const staged   =dayJobs.filter(j=>getStartHour(j)===null);

      /* ── FIX: Drop overlay uses dragover on the ROW itself.
         Cards have pointer-events:none while .dragging so events pass through.
         We track position manually to find the nearest 30-min slot. ── */
      const dropOverlay=document.createElement("div");
      dropOverlay.className="day-drop-overlay";
      dropOverlay.style.width=`${HOUR_W*hours}px`;
      dropOverlay.style.pointerEvents="none"; // overlay itself is transparent

      for(let h=DAY_START;h<dayEnd;h++){
        [0,0.5].forEach(half=>{
          const dz=document.createElement("div");
          dz.className="day-hour-drop";dz.style.width=(HOUR_W/2)+"px";
          const slot={eng,date:toUKStr(col),hour:h+half};
          const lbl=document.createElement("span");lbl.className="slot-label";lbl.textContent=fmtTime(h+half);
          dz.appendChild(lbl);

          /* Re-enable pointer events on individual slots */
          dz.style.pointerEvents="all";

          dz.addEventListener("dragover",e=>{
            e.preventDefault();
            e.dataTransfer.dropEffect="move";
            dz.classList.add("drag-over");
          });
          dz.addEventListener("dragleave",()=>dz.classList.remove("drag-over"));
          dz.addEventListener("drop",e=>{
            e.preventDefault();
            dz.classList.remove("drag-over");
            handleDrop(eng,toUKStr(col),h+half);
          });
          dropOverlay.appendChild(dz);
        });
      }
      row.appendChild(dropOverlay);

      /* Scheduled cards — absolutely positioned, z-index 2 normally, 0 when dragging */
      scheduled.forEach(job=>{
        const sh=getStartHour(job),dur=getDuration(job.jobType);
        const left=(sh-DAY_START)*HOUR_W,width=dur*HOUR_W-4;
        row.appendChild(makeCardDay(job,left,width,false));
      });

      /* Staging zone */
      const sz=document.createElement("div");sz.className="staging-zone";
      sz.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";sz.classList.add("drag-over-s");});
      sz.addEventListener("dragleave",()=>sz.classList.remove("drag-over-s"));
      sz.addEventListener("drop",e=>{e.preventDefault();sz.classList.remove("drag-over-s");handleDropStaged(eng,toUKStr(col));});
      if(staged.length===0){
        const hint=document.createElement("div");hint.className="staging-hint";
        hint.innerHTML=`<span>Drop here<br/>to unschedule</span>`;sz.appendChild(hint);
      }else{
        staged.forEach(job=>{
          const c=makeCardDay(job,0,STAGING_W-18,true);
          c.classList.add("staging-card");
          c.style.position="relative";c.style.top="";c.style.bottom="";c.style.left="";c.style.width=(STAGING_W-18)+"px";
          sz.appendChild(c);
        });
      }
      row.appendChild(sz);

    /* ── WEEK VIEW ── */
    }else{
      cols.forEach(col=>{
        const cell=document.createElement("div");
        cell.className="week-cell-drop";
        const dow=col.getDay();
        if(dow===0||dow===6)cell.classList.add("weekend");
        if(sameDay(col,todayD))cell.classList.add("today-col");

        cell.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";cell.classList.add("drag-over");});
        cell.addEventListener("dragleave",()=>cell.classList.remove("drag-over"));
        cell.addEventListener("drop",e=>{
          e.preventDefault();
          cell.classList.remove("drag-over");
          hideStackPopup();
          handleDrop(eng,toUKStr(col),null);
        });

        const dayJobs=engJobs.filter(j=>sameDay(parseDate(j.dateOfJob),col));

        if(dayJobs.length>1){
          /* ── STACKED: show first card + badge.
             Hover triggers a fixed-position floating popup with ALL cards. ── */
          cell.classList.add("stacked");

          // First card visible
          const firstCard=makeCardWeek(dayJobs[0]);
          cell.appendChild(firstCard);

          // Badge
          const badge=document.createElement("div");
          badge.className="stack-badge";
          badge.textContent=`+${dayJobs.length-1}`;
          cell.appendChild(badge);

          /* Build popup cards list (all jobs for this cell) */
          const popupCards=dayJobs.map(job=>makeCardWeek(job));

          /* Mouseenter: position and show the fixed popup */
          cell.addEventListener("mouseenter",()=>{
            if(dragJob)return; // don't show popup during drag
            showStackPopup(cell, popupCards, eng, col);
          });
          cell.addEventListener("mouseleave",(e)=>{
            // Only hide if mouse isn't moving into the popup itself
            const popup=document.getElementById("weekStackPopup");
            if(!popup.contains(e.relatedTarget)){
              scheduleHidePopup();
            }
          });

        }else{
          dayJobs.forEach(job=>cell.appendChild(makeCardWeek(job)));
        }
        row.appendChild(cell);
      });
    }

    rowsCont.appendChild(row);
  });

  if(currentView==="day")updateNowLine(dayEnd);
}

/* ─── Week stack popup (fixed-position, escapes all clip contexts) ─── */
let popupHideTimer=null;
const popup=document.getElementById("weekStackPopup");

popup.addEventListener("mouseenter",()=>{
  clearTimeout(popupHideTimer);
});
popup.addEventListener("mouseleave",()=>{
  scheduleHidePopup();
});

function showStackPopup(cell, cards, eng, col){
  clearTimeout(popupHideTimer);

  // Position popup below the cell using getBoundingClientRect
  const rect=cell.getBoundingClientRect();
  popup.innerHTML="";

  // Add drag support: week cells in popup should accept drops
  popup.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";popup.style.outline="2px dashed rgba(0,255,157,0.4)";});
  popup.addEventListener("dragleave",()=>{popup.style.outline="";});
  popup.addEventListener("drop",e=>{
    e.preventDefault();
    popup.style.outline="";
    hideStackPopup();
    handleDrop(eng,toUKStr(col),null);
  });

  cards.forEach(card=>{
    // Reassign drag listeners for popup copies
    const c=card.cloneNode(true);
    const origJob=allJobs.find(j=>(j.jobId||j._id)===card.dataset.jobId);
    if(origJob){
      c.draggable=true;
      c.addEventListener("dragstart",e=>{
        dragJob=origJob;
        c.classList.add("dragging");
        e.dataTransfer.effectAllowed="move";
        scheduleHidePopup();
      });
      c.addEventListener("dragend",()=>c.classList.remove("dragging"));
      c.addEventListener("click",e=>{e.stopPropagation();hideStackPopup();openModal(origJob);});
    }
    popup.appendChild(c);
  });

  // Calculate position — show below cell, flip up if near bottom
  let top=rect.bottom+6;
  let left=rect.left;
  const popW=220, popH=cards.length*72+24;
  if(top+popH>window.innerHeight-16) top=rect.top-popH-6;
  if(left+popW>window.innerWidth-16)  left=window.innerWidth-popW-16;

  popup.style.top=top+"px";
  popup.style.left=left+"px";
  popup.style.width=Math.max(rect.width,160)+"px";
  popup.classList.add("visible");
}

function scheduleHidePopup(){
  clearTimeout(popupHideTimer);
  popupHideTimer=setTimeout(hideStackPopup, 120);
}

function hideStackPopup(){
  clearTimeout(popupHideTimer);
  popup.classList.remove("visible");
  popup.innerHTML="";
}

// Hide popup on scroll or click outside
document.addEventListener("click",e=>{
  if(!popup.contains(e.target))hideStackPopup();
});

/* ─── Card builders ──────────────────────────────────────────── */
function makeCardDay(job,left,width,isStaged){
  const col=cardColour(job.jobType);
  const sh=getStartHour(job);
  const dur=getDuration(job.jobType);
  const card=document.createElement("div");
  card.className="job-card-day";
  if(!isStaged){card.style.position="absolute";card.style.left=left+"px";card.style.width=width+"px";}
  card.style.borderTopColor=col;
  card.draggable=true;
  card.dataset.jobId=job.jobId||job._id;
  card.dataset.jobType=job.jobType||"";

  const narrow=width<100;
  const timeStr=sh!==null?`${fmtTime(sh)}–${fmtTime(sh+dur)}`:"Unscheduled";

  card.innerHTML=`
    <div style="overflow:hidden;flex:1;min-height:0;">
      <div class="jc-customer" style="font-size:${narrow?"9px":"10px"}">${esc(job.customerName)}</div>
      <div class="jc-type" style="font-size:${narrow?"10px":"12px"}">${esc(job.jobType)}</div>
      ${!isStaged?`<div class="jc-time" style="font-size:${narrow?"9px":"10px"}">${timeStr}</div>`:""}
    </div>
    <div class="jc-bottom">
      <span class="jc-post" style="font-size:${narrow?"9px":"10px"}">${esc(job.postcode)}</span>
      <span class="jc-id" style="font-size:${narrow?"9px":"10px"}">${esc(job.jobId||job._id)}</span>
    </div>
    <div class="jc-tooltip">
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Customer</span><span class="jc-tooltip-val">${esc(job.customerName)}</span></div>
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Job Type</span><span class="jc-tooltip-val">${esc(job.jobType)}</span></div>
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Postcode</span><span class="jc-tooltip-val">${esc(job.postcode)}</span></div>
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Time</span><span class="jc-tooltip-val">${timeStr}</span></div>
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Engineer</span><span class="jc-tooltip-val">${esc(job.engineerName)}</span></div>
      <div class="jc-tooltip-row"><span class="jc-tooltip-lbl">Job ID</span><span class="jc-tooltip-val" style="color:var(--accent-green)">${esc(job.jobId||job._id)}</span></div>
    </div>`;

  card.addEventListener("dragstart",e=>{
    dragJob=job;
    card.classList.add("dragging");
    e.dataTransfer.effectAllowed="move";
    /* Use a transparent drag image so the ghost doesn't block drop zones */
    const ghost=document.createElement("div");
    ghost.style.cssText="position:fixed;top:-1000px;left:-1000px;width:1px;height:1px;opacity:0;";
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost,0,0);
    setTimeout(()=>ghost.remove(),0);
  });
  card.addEventListener("dragend",()=>{
    card.classList.remove("dragging");
    dragJob=null;
  });
  card.addEventListener("click",e=>{e.stopPropagation();openModal(job);});
  return card;
}

function makeCardWeek(job){
  const col=cardColour(job.jobType);
  const card=document.createElement("div");
  card.className="job-card-week";
  card.style.borderLeftColor=col;
  card.draggable=true;
  card.dataset.jobId=job.jobId||job._id;
  card.dataset.jobType=job.jobType||"";
  const sh=getStartHour(job);
  card.innerHTML=`
    <div class="jc-customer">${esc(job.customerName)}</div>
    <div class="jc-type" style="font-size:11px">${esc(job.jobType)}</div>
    <div class="jc-bottom">
      <span class="jc-post">${esc(job.postcode)}</span>
      <span class="jc-id">${esc(job.jobId||job._id)}</span>
    </div>
    ${sh!==null?`<div style="font-size:9px;color:var(--text-muted);margin-top:2px">${fmtTime(sh)}</div>`:""}`;
  card.addEventListener("dragstart",e=>{
    dragJob=job;
    card.classList.add("dragging");
    e.dataTransfer.effectAllowed="move";
    scheduleHidePopup();
  });
  card.addEventListener("dragend",()=>{card.classList.remove("dragging");dragJob=null;});
  card.addEventListener("click",e=>{e.stopPropagation();openModal(job);});
  return card;
}

/* ─── Now line ───────────────────────────────────────────────── */
function updateNowLine(dayEnd){
  document.getElementById("nowLine")?.remove();
  if(!sameDay(currentDate,today0()))return;
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  if(h<DAY_START||h>dayEnd)return;
  const line=document.createElement("div");line.id="nowLine";line.className="now-line";
  line.style.left=`${(h-DAY_START)*HOUR_W}px`;
  document.getElementById("rowsWrap").appendChild(line);
}
setInterval(()=>{if(currentView==="day"){const dj=allJobs.filter(j=>{const d=parseDate(j.dateOfJob);return d&&sameDay(d,currentDate);});updateNowLine(calcDayEnd(dj));}},60000);

/* ─── Drop handlers ──────────────────────────────────────────── */
function handleDrop(newEng,newDate,newHour){
  if(!dragJob)return;
  const updates={};
  if(newEng!==dragJob.engineerName)updates.engineerName=newEng;
  if(newDate!==dragJob.dateOfJob)updates.dateOfJob=newDate;
  if(currentView==="day"&&newHour!==null){
    updates.startHour=newHour;
  }else if(currentView==="week"&&newDate!==dragJob.dateOfJob){
    updates.startHour=null;
  }
  if(Object.keys(updates).length===0){dragJob=null;return;}
  persistUpdate(dragJob._id,updates);
}

function handleDropStaged(newEng,newDate){
  if(!dragJob)return;
  const updates={startHour:null};
  if(newEng!==dragJob.engineerName)updates.engineerName=newEng;
  if(newDate!==dragJob.dateOfJob)updates.dateOfJob=newDate;
  persistUpdate(dragJob._id,updates);
}

async function persistUpdate(jobId,updates){
  const job=allJobs.find(j=>j._id===jobId);
  if(job){for(const[k,v]of Object.entries(updates)){if(v===null)delete job[k];else job[k]=v;}}
  dragJob=null; render();
  try{
    const fs={};
    for(const[k,v]of Object.entries(updates)) fs[k]=v===null?deleteField():v;
    await updateDoc(doc(db,"uploaded_jobs",jobId),fs);
    toast("Saved ✓");
  }catch(err){
    console.error(err); toast("Save failed: "+(err.code||err.message),"error");
    loadJobs();
  }
}

/* ─── Search ─────────────────────────────────────────────────── */
function applySearch(){
  const hasJ=jobSearch.length>0,hasE=engSearch.length>0;
  document.querySelectorAll(".eng-tl-row[data-eng]").forEach(r=>{r.style.display=hasE&&!r.dataset.eng.toLowerCase().includes(engSearch)?"none":"";});
  document.querySelectorAll(".eng-row[data-eng]").forEach(r=>{r.style.display=hasE&&!r.dataset.eng.toLowerCase().includes(engSearch)?"none":"";});
  if(hasJ){
    document.querySelectorAll(".job-card-day,.job-card-week").forEach(c=>{
      const m=(c.dataset.jobId||"").toLowerCase().includes(jobSearch)||(c.dataset.jobType||"").toLowerCase().includes(jobSearch);
      c.classList.toggle("search-match",m);c.classList.toggle("search-dim",!m);
    });
  }else{
    document.querySelectorAll(".job-card-day,.job-card-week").forEach(c=>{c.classList.remove("search-match","search-dim");});
  }
}

/* ─── Modal ──────────────────────────────────────────────────── */
function openModal(job){
  const sh=getStartHour(job),dur=getDuration(job.jobType);
  document.getElementById("modalTitle").textContent=job.jobType||"Job Details";
  document.getElementById("modalId").textContent=`# ${job.jobId||job._id}`;
  document.getElementById("modalBody").innerHTML=`
    <div class="dg">
      <div class="df"><label>Customer</label><span>${esc(job.customerName)}</span></div>
      <div class="df"><label>Contact</label><span>${esc(job.contactNumber)}</span></div>
      <div class="df full"><label>Address</label><span>${esc(job.address)}</span></div>
      <div class="df"><label>Postcode</label><span>${esc(job.postcode)}</span></div>
      <div class="df"><label>Job Type</label><span>${esc(job.jobType)}</span></div>
      <div class="df"><label>Engineer</label><span>${esc(job.engineerName)}</span></div>
      <div class="df"><label>Date</label><span>${esc(job.dateOfJob)}</span></div>
      <div class="df"><label>Time Slot</label><span>${esc(job.timeSlot||"—")}</span></div>
      <div class="df"><label>Scheduled</label><span>${sh!==null?fmtTime(sh)+" – "+fmtTime(sh+dur)+" ("+dur+"h)":"Unscheduled"}</span></div>
      <div class="df"><label>Job ID</label><span style="color:var(--accent-green);font-weight:700">${esc(job.jobId||job._id)}</span></div>
      <div class="ddiv"></div>
      <div class="df"><label>Status</label><span>${esc(job.status||"unassigned")}</span></div>
      <div class="df"><label>Uploaded</label><span>${job.uploadedAt?new Date(job.uploadedAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—"}</span></div>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}

/* ─── Sidebar ────────────────────────────────────────────────── */
const sidebar=document.getElementById("sidebar");
document.getElementById("sidebarToggle").onclick=toggleSidebar;
document.getElementById("logoCollapsed").onclick=toggleSidebar;
function toggleSidebar(){sidebar.classList.toggle("expanded");localStorage.setItem("geko-sidebar",sidebar.classList.contains("expanded")?"expanded":"collapsed");}
if(localStorage.getItem("geko-sidebar")==="expanded")sidebar.classList.add("expanded");

/* ─── Boot ───────────────────────────────────────────────────── */
syncPicker();
loadJobs();
</script>
