<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geko User Management Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: #05070b;
        --bg-panel: rgba(18, 24, 38, 0.85);
        --accent-green: #00ff9d;
        --accent-blue: #00c8ff;
        --text-main: #e6f7ff;
        --text-muted: #8fa0b8;
        --danger: #ff4b5c;
        --border-glow: 0 0 18px rgba(0, 255, 157, 0.45);
        --transition-fast: 0.18s ease-out;
        --transition-med: 0.28s ease-out;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top left, #101525 0, #05070b 45%, #020308 100%);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.35;
        pointer-events: none;
        animation: gridMove 40s linear infinite;
    }

    @keyframes gridMove {
        from { transform: translate3d(0,0,0); }
        to { transform: translate3d(-40px,-40px,0); }
    }

    /* LOGIN */
    #login-container {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(18px);
        z-index: 10;
    }

    #login-box {
        width: 360px;
        padding: 32px 30px 28px;
        border-radius: 18px;
        background: radial-gradient(circle at top left, rgba(0,255,157,0.12), transparent 55%),
                    radial-gradient(circle at bottom right, rgba(0,200,255,0.12), transparent 55%),
                    rgba(10, 14, 24, 0.92);
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.04),
            0 24px 60px rgba(0,0,0,0.75);
        position: relative;
        overflow: hidden;
        animation: loginFadeIn 0.6s var(--transition-med);
    }

    #login-box::before {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(from 180deg, rgba(0,255,157,0.18), rgba(0,200,255,0.18), transparent 40%, transparent 60%, rgba(0,255,157,0.18));
        opacity: 0.35;
        filter: blur(32px);
        z-index: -1;
        animation: rotateGlow 18s linear infinite;
    }

    @keyframes rotateGlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes loginFadeIn {
        from { opacity: 0; transform: translateY(18px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    #login-logo {
        display: block;
        margin: 0 auto 14px;
        height: 60px;
        filter: drop-shadow(0 0 12px rgba(0,255,157,0.6));
        border-radius: 12px;
    }

    #login-title {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    #login-subtitle {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 22px;
    }

    .input-shell {
        position: relative;
        margin-bottom: 14px;
    }

    .input-shell input {
        width: 100%;
        padding: 11px 12px 11px 34px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(5, 8, 16, 0.85);
        color: var(--text-main);
        font-size: 14px;
        outline: none;
        transition: var(--transition-fast);
    }

    .input-shell input:focus {
        border-color: var(--accent-green);
        box-shadow: var(--border-glow);
        background: rgba(8, 12, 22, 0.95);
        transform: translateY(-1px);
    }

    .input-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 13px;
        color: var(--accent-blue);
        opacity: 0.8;
    }

    #login-button {
        width: 100%;
        margin-top: 10px;
        padding: 11px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
        color: #020308;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: var(--transition-fast);
    }

    #login-button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
    }

    #login-error {
        margin-top: 10px;
        font-size: 12px;
        color: var(--danger);
        text-align: center;
        display: none;
    }

    /* TOPBAR */
    #topbar {
        width: 100%;
        padding: 14px 26px;
        background: rgba(5,10,18,0.9);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 5;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    #topbar-title {
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
    }

    #topbar-subtitle {
        font-size: 12px;
        color: var(--text-muted);
    }

    #status-dot {
        width: 10px;
        height: 10px;
        background: var(--accent-green);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0,255,157,0.8);
        display: inline-block;
        margin-right: 6px;
    }

    /* MAIN LAYOUT */
    #main {
        padding: 26px;
    }

    #main-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 26px;
        max-width: 1600px;
        margin: 0 auto;
    }

    .panel {
        border-radius: 18px;
        background: rgba(10,14,24,0.9);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 20px;
        backdrop-filter: blur(18px);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.7), 0 24px 60px rgba(0,0,0,0.9);
    }

    .panel-title {
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 4px;
    }

    .panel-subtitle {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
    }

    /* FORM */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
    }

    .form-field {
        display: flex;
        flex-direction: column;
    }

    .form-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 4px;
    }

    .form-input,
    .form-select {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(5, 8, 16, 0.9);
        color: var(--text-main);
        font-size: 14px;
        outline: none;
        transition: var(--transition-fast);
    }

    .form-input:focus,
    .form-select:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 16px rgba(0,200,255,0.45);
        transform: translateY(-1px);
    }

    #add-user-btn {
        margin-top: 10px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
        color: #020308;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: var(--transition-fast);
    }

    #add-user-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
    }

    /* USER DIRECTORY */
    #user-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }

    .control-input,
    .control-select {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(5, 8, 16, 0.9);
        color: var(--text-main);
        font-size: 12px;
        outline: none;
    }

    #export-btn {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(0,255,157,0.7);
        background: rgba(0,255,157,0.08);
        color: var(--accent-green);
        font-size: 12px;
        cursor: pointer;
        transition: var(--transition-fast);
    }

    #export-btn:hover {
        background: rgba(0,255,157,0.18);
        box-shadow: 0 0 16px rgba(0,255,157,0.6);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    th {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
        background: rgba(0,255,157,0.12);
    }

    tr:hover {
        background: rgba(0,255,157,0.06);
    }

    .role-pill {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        font-size: 11px;
        text-transform: uppercase;
    }

    .edit-btn,
    .delete-btn {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(5, 8, 16, 0.9);
        color: var(--text-muted);
        transition: var(--transition-fast);
    }

    .edit-btn {
        border-color: rgba(0,200,255,0.7);
        color: #aee9ff;
    }

    .edit-btn:hover {
        background: rgba(0,200,255,0.18);
        box-shadow: 0 0 16px rgba(0,200,255,0.6);
    }

    .delete-btn {
        border-color: rgba(255,75,92,0.7);
        color: #ffb3bd;
    }

    .delete-btn:hover {
        background: rgba(255,75,92,0.18);
        box-shadow: 0 0 16px rgba(255,75,92,0.6);
    }

    /* PAGINATION */
    #pagination {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        font-size: 12px;
    }

    .page-btn {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(5, 8, 16, 0.9);
        color: var(--text-main);
        cursor: pointer;
        transition: var(--transition-fast);
    }

    .page-btn:hover {
        background: rgba(0,200,255,0.18);
        box-shadow: 0 0 12px rgba(0,200,255,0.5);
    }

    .page-btn:disabled {
        opacity: 0.4;
        cursor: default;
    }

    /* EDIT MODAL */
    #edit-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 20;
        backdrop-filter: blur(10px);
    }

    #edit-modal {
        width: 420px;
        max-width: 95%;
        padding: 20px;
        border-radius: 18px;
        background: rgba(10,14,24,0.96);
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 24px 60px rgba(0,0,0,0.9);
    }

    #edit-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    #edit-save,
    #edit-cancel {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(5, 8, 16, 0.9);
        color: var(--text-main);
        font-size: 12px;
        cursor: pointer;
        transition: var(--transition-fast);
    }

    #edit-save {
        border-color: rgba(0,255,157,0.7);
        background: rgba(0,255,157,0.12);
    }

    #edit-save:hover {
        background: rgba(0,255,157,0.2);
        box-shadow: 0 0 14px rgba(0,255,157,0.7);
    }

    #edit-cancel:hover {
        background: rgba(0,200,255,0.18);
        box-shadow: 0 0 14px rgba(0,200,255,0.6);
    }

</style>
</head>
<body>

<div id="login-container">
    <div id="login-box">
        <img id="login-logo" src="https://www.dropbox.com/scl/fi/90alqdk8bozulywe2c8bw/Tech-inspired-Geko-logo-design.png?rlkey=tcagro1dwoelqxfmxqldrp178&st=llvwvpwg&dl=1">
        <div id="login-title">Geko Access Portal</div>
        <div id="login-subtitle">Administrator authentication required</div>

            <input type="text" id="login-username" placeholder="Username">
        </div>

        <div class="input-shell">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" placeholder="Password">
        </div>

        <button id="login-button" onclick="login()">Authenticate</button>
        <div id="login-error">Invalid login</div>
    </div>
</div>
